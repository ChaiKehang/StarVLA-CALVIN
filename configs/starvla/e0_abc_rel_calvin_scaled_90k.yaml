# Immutable reconstruction of the successful CALVIN ABC->D E0 baseline.
#
# Important data semantic:
# `action_mode: abs` means "read the action stored in parquet as-is".  The
# dataset has already been converted offline to scaled CALVIN rel_actions:
#   xyz = clip((absolute_next_xyz - state_xyz) * 50, -1, 1)
#   rpy = clip(wrap_to_pi(absolute_next_rpy - state_rpy) * 20, -1, 1)
#   gripper = absolute gripper command

run_id: e0_abc_rel
run_root_dir: ./results/Checkpoints
seed: 42
wandb_entity: disabled
wandb_project: starVLA_Calvin_E0
is_debug: false
version_id: "e0_abc_rel_calvin_scaled_90k_v1"

framework:
  name: QwenPI_v3

  qwenvl:
    # The generic launcher overrides this with an absolute path.
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2560
    num_vl_layers: 36

  dino:
    dino_backbone: dinov2_vits14

  action_model:
    action_model_type: DiT-B
    hidden_size: 1024
    action_hidden_dim: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    action_horizon: 8
    future_action_window_size: 7
    past_action_window_size: 0

    # Kept for checkpoint/config compatibility.  In the audited QwenPI_v3
    # implementation, training repetition is actually read from
    # trainer.repeated_diffusion_steps below.
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32

    diffusion_model_cfg:
      input_embedding_dim: 1024
      output_dim: 1024
      cross_attention_dim: 1024
      action_dit_hidden_dim: 1024
      num_layers: 36
      num_attention_heads: 16
      attention_head_dim: 64
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      positional_embeddings: null

  reduce_in_full_precision: true

datasets:
  # The VLM loss is disabled and qwen_vl_interface is frozen.  These schema
  # fields remain because StarVLA expects a complete config, but train_starvla
  # builds only the VLA dataloader in this baseline.
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen3.vl
    per_device_batch_size: 1

  vla_data:
    dataset_py: lerobot_datasets
    include_state: false
    # The generic launcher overrides this with an absolute path.
    data_root_dir: ./playground/Datasets/kehang-CALVIN/calvin/lerobot
    data_mix: calvin_abc_d_sixpigs_rel_scaled
    action_mode: abs
    action_type: calvin_scaled_rel_actions
    CoT_prompt: "Your task is {instruction}."
    per_device_batch_size: 8
    load_all_data_for_training: true
    video_backend: torchvision_av

trainer:
  # This is an independent 90k run initialized from the Bridge-RT-1 weights;
  # it is not a resume of the optimizer/scheduler state from that pretraining.
  is_resume: false
  pretrained_checkpoint: ./playground/Pretrained_models/starvla_qwenpi_pretrain_qwen3_4b_bridge-rt_1/checkpoints/steps_50000_pytorch_model.pt

  max_train_steps: 90000
  num_warmup_steps: 5000
  save_interval: 6000
  eval_interval: 1000

  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04

  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06

  freeze_modules: qwen_vl_interface
  loss_scale:
    vla: 1.0
    vlm: 0.0

  # QwenPI_v3 reads this trainer-level value.  The original successful run did
  # not set it explicitly and therefore used the implementation default 16;
  # spelling it out here removes that hidden dependency.
  repeated_diffusion_steps: 16

  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 20
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
